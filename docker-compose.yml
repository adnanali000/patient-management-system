networks:
  internal:
    driver: bridge

services:
  patient-service-db:
    image: postgres:16-alpine
    container_name: patient-service-db
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: password
    ports:
      - "5000:5432"
    volumes:
      - ./db_volumes/patient-service-db:/var/lib/postgresql
    networks:
      - internal
